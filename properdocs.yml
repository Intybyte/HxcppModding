site_name: Hxcpp Modding
site_description: Documentation for modding programs compiled with hxcpp
site_author: Intybyte
site_url: https://intybyte.github.io/hxcppmodding.github.io/
repo_url: https://github.com/Intybyte/HxcppModding

theme:
  name: material
  # logo: img/favicon.png
  # favicon: img/favicon.png
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - content.tabs.link
  icon:
    repo: simple/github

extra_css:
  - style.css

nav:
  - Home:
    - Introduction: index.md
  - Required Tools & Usage:
    - Introduction: tools/index.md
    - Decompiler: tools/decompiler.md
    - Dynamic Analysis: tools/dynamic-analysis.md
    - Documentation: tools/documentation.md
    - Coherent use of AI: tools/ai.md
  - Reverse Engineering Tricks:
    - Introduction: tricks/index.md
    - String constants: tricks/string-constants.md
    - Bottom up: tricks/bottom-up.md
    - Proper namespacing: tricks/proper-namespacing.md
    - Locate boot_all: tricks/locate-boot-all.md
    - Blinkers: tricks/blinkers.md
  - Modding:
    - Launcher and Loader: mod/launcher-loader.md
    - Assembly Patching & Hooking: mod/assembly-ph.md
    - Expectations: mod/expectations.md
  - Case Study:
    - Example Game Introduction: tec2/index.md
    - Reverse Engineering:
      - Introduction: tec2/re/index.md
      - Track Interested Functions: tec2/re/track-functions.md
      - Identifying Calls: tec2/re/identifying-calls.md
    - Creating the Mod:
      - Introduction: tec2/mod/index.md
      - Patch loading function: tec2/mod/loading.md
      - Patch end of load all function: tec2/mod/load-all.md

markdown_extensions:
  - def_list
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      guess_lang: false
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - open-in-new-tab
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
